version: '3.9'

services:
  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npx json-server --watch db.json --port 4000 --host 0.0.0.0"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://api:4000
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  frontend_node_modules:
  api_node_modules:
